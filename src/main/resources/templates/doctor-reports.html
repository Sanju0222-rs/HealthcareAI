<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctor Medical Reports</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>Medical Reports</h2>

        <div>
            <a href="/doctor/dashboard"
               class="btn btn-outline-primary">
                Dashboard
            </a>

            <a href="/doctor/addReport"
               class="btn btn-success">
                Add Report
            </a>

            <a href="/logout"
               class="btn btn-danger">
                Logout
            </a>
        </div>

    </div>

    <div class="card shadow">

        <div class="card-body">

            <table class="table table-bordered table-hover">

                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Report ID</th>
                    <th>Patient ID</th>
                    <th>Patient Name</th>
                    <th>Doctor Name</th>
                    <th>Diagnosis</th>
                    <th>Prescription</th>
                    <th>Report Date</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="report : ${reports}">

                    <td th:text="${report.id}"></td>

                    <td th:text="${report.reportId}"></td>

                    <td th:text="${report.patientId}"></td>

                    <td th:text="${report.patientName}"></td>

                    <td th:text="${report.doctorName}"></td>

                    <td th:text="${report.diagnosis}"></td>

                    <td th:text="${report.prescription}"></td>

                    <td th:text="${report.reportDate}"></td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
