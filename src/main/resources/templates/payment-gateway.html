<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payment Gateway</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-5 text-center">

        <h2>HealthcareAI Payment Gateway</h2>

        <hr>

        <h5>Invoice: <span th:text="${bill.invoiceId}"></span></h5>
        <h5>Patient: <span th:text="${bill.patientName}"></span></h5>
        <h5>Doctor: <span th:text="${bill.doctorName}"></span></h5>

        <hr>

        <p>Subtotal: ₹ <span th:text="${bill.totalAmount}"></span></p>
        <p>GST 18%: ₹ <span th:text="${bill.gstAmount}"></span></p>

        <h3>
            Grand Total: ₹ <span th:text="${bill.grandTotal}"></span>
        </h3>

        <div class="my-4">
            <img th:src="@{'https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=HealthcareAI-Invoice-' + ${bill.invoiceId}}"
                 alt="Payment QR">
        </div>

        <p class="text-muted">
            Scan QR or click Pay Now to simulate payment.
        </p>

        <button onclick="simulatePayment()"
                class="btn btn-success btn-lg">
            Pay Now
        </button>

        <a href="/billing/"
           class="btn btn-secondary btn-lg ms-2">
            Back
        </a>

    </div>

</div>

<script th:inline="javascript">
    function simulatePayment(){

        alert("Processing payment...");

        setTimeout(function(){

            window.location.href =
                "/billing/paymentSuccess/" + [[${bill.id}]];

        }, 2000);
    }
</script>

</body>
</html>
