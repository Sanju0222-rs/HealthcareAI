<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctor - Add Report</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container mt-5">

    <div class="topbar">
        <h4>Add Medical Report</h4>

        <div>
            <a href="/doctor/dashboard" class="btn btn-outline-primary">Dashboard</a>
            <a href="/logout" class="btn btn-danger">Logout</a>
        </div>
    </div>

    <div class="card shadow p-4 mt-4">

        <form th:action="@{/doctor/saveReport}" method="post" th:object="${report}">

            <input type="text" th:field="*{reportId}" class="form-control mb-3" placeholder="Report ID">

            <input type="text" th:field="*{patientId}" class="form-control mb-3" placeholder="Patient ID">

            <input type="text" th:field="*{patientName}" class="form-control mb-3" placeholder="Patient Name">

            <input type="text" th:field="*{doctorName}" class="form-control mb-3" placeholder="Doctor Name">

            <textarea th:field="*{diagnosis}" class="form-control mb-3" placeholder="Diagnosis"></textarea>

            <textarea th:field="*{prescription}" class="form-control mb-3" placeholder="Prescription"></textarea>

            <input type="date" th:field="*{reportDate}" class="form-control mb-3">

            <button class="btn btn-success">Save Report</button>

            <a href="/doctor/reports" class="btn btn-secondary">← Back</a>

        </form>

    </div>

</div>

</body>
</html>
