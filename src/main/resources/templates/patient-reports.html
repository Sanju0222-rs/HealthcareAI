<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Medical Reports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container mt-5">

    <div class="topbar">
        <h4>My Medical Reports</h4>

        <div>
            <a href="/patient/dashboard" class="btn btn-outline-primary">Dashboard</a>
            <a href="/logout" class="btn btn-danger">Logout</a>
        </div>
    </div>

    <table class="table table-bordered table-hover mt-4">
        <thead class="table-dark">
        <tr>
            <th>Report ID</th>
            <th>Patient</th>
            <th>Doctor</th>
            <th>Diagnosis</th>
            <th>Prescription</th>
            <th>Date</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="r : ${reports}">
            <td th:text="${r.reportId}"></td>
            <td th:text="${r.patientName}"></td>
            <td th:text="${r.doctorName}"></td>
            <td th:text="${r.diagnosis}"></td>
            <td th:text="${r.prescription}"></td>
            <td th:text="${r.reportDate}"></td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
