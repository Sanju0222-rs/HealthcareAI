<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2>Doctor Management</h2>
    <a href="/admin"
   class="btn btn-secondary mb-3">
   ← Dashboard
</a>

    <a href="/doctors/addDoctor" class="btn btn-primary mb-3">
        Add Doctor
    </a>
    
<form action="/doctors/search" method="get" class="d-flex mb-3">
    <input type="text" name="keyword" class="form-control me-2" placeholder="Search doctor by name">
    <button class="btn btn-primary">Search</button>
</form>
    <table class="table table-bordered">
        

        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Specialization</th>
            <th>Email</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

<tr th:each="doctor : ${doctors}">
    <td th:text="${doctor.id}"></td>
    <td th:text="${doctor.name}"></td>
    <td th:text="${doctor.specialization}"></td>
    <td th:text="${doctor.email}"></td>
    <td>
    <a th:href="@{'/doctors/edit/' + ${doctor.id}}"
       class="btn btn-warning btn-sm">
        Edit
    </a>

    <a th:href="@{'/doctors/delete/' + ${doctor.id}}"
       class="btn btn-danger btn-sm">
        Delete
    </a>
</td>
    
</tr>

</tbody>

    </table>

</div>

</body>
</html>
