<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Appointment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container mt-5">

    <div class="topbar">

        <h4>Book Appointment</h4>

        <div>
            <a href="/patient/dashboard"
               class="btn btn-outline-primary">
                Dashboard
            </a>

            <a href="/logout"
               class="btn btn-danger">
                Logout
            </a>
        </div>

    </div>

    <div class="card shadow p-4 mt-4">

        <h2>Book Appointment</h2>

        <form th:action="@{/patient/saveAppointment}"
              method="post"
              th:object="${appointment}">

            <input type="hidden" name="status" value="PENDING">

            <div class="mb-3">
                <label>Appointment ID</label>
                <input type="text"
                       th:field="*{appointmentId}"
                       class="form-control"
                       readonly>
            </div>

            <div class="mb-3">
                <label>Patient Name</label>
                <input type="text"
                       class="form-control"
                       th:value="${session.userName}"
                       readonly>
            </div>

            <div class="mb-3">
                <label>Doctor</label>

                <select th:field="*{doctorName}"
                        class="form-control"
                        required>

                    <option value="">
                        Select Doctor
                    </option>

                    <option th:each="doctor : ${doctors}"
                            th:value="${doctor.name}"
                            th:text="${doctor.name + ' - ' + doctor.specialization}">
                    </option>

                </select>
            </div>

            <div class="mb-3">
                <label>Available Slot</label>

                <select class="form-control"
                        id="slotSelect"
                        onchange="fillSlot()"
                        required>

                    <option value="">
                        Select Slot
                    </option>

                    <option th:each="slot : ${slots}"
                            th:value="${slot.availableDate + '|' + slot.startTime}"
                            th:text="${slot.doctorName + ' | ' + slot.availableDate + ' | ' + slot.startTime + ' - ' + slot.endTime}">
                    </option>

                </select>
            </div>

            <input type="hidden"
                   th:field="*{appointmentDate}"
                   id="appointmentDate">

            <input type="hidden"
                   th:field="*{appointmentTime}"
                   id="appointmentTime">

            <div class="mb-3">
                <label>Status</label>
                <input type="text"
                       class="form-control"
                       value="PENDING"
                       readonly>
            </div>

            <button class="btn btn-success">
                Book Appointment
            </button>

            <a href="/patient/dashboard"
               class="btn btn-secondary">
                ← Back
            </a>

        </form>

    </div>

</div>

<script>
function fillSlot(){
    let selected = document.getElementById("slotSelect").value;

    if(selected !== ""){
        let parts = selected.split("|");

        document.getElementById("appointmentDate").value = parts[0];
        document.getElementById("appointmentTime").value = parts[1];
    }
}
</script>

</body>
</html>
