<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Medical Reports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Medical Reports</h2>
    

    <a href="/reports/addReport"
       class="btn btn-primary mb-3">
        Add Report
    </a>
     <a href="/admin"
   class="btn btn-secondary mb-3">
   ← Dashboard
</a>
<form action="/reports/search" method="get" class="d-flex mb-3">
    <input type="text" name="keyword" class="form-control me-2" placeholder="Search report by patient name">
    <button class="btn btn-primary">Search</button>
    <a href="/reports/" class="btn btn-secondary ms-2">Reset</a>
    
</form>

    <table class="table table-bordered">

        <thead>
        <tr>
            <th>ID</th>
            <th>Report ID</th>
            <th>Patient</th>
            <th>Doctor</th>
            <th>Date</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="r : ${reports}">
            <td th:text="${r.id}"></td>
            <td th:text="${r.reportId}"></td>
            <td th:text="${r.patientName}"></td>
            <td th:text="${r.doctorName}"></td>
            <td th:text="${r.reportDate}"></td>
            <td>
    <a th:href="@{'/reports/edit/' + ${r.id}}" class="btn btn-warning btn-sm">Edit</a>

    <a th:href="@{'/reports/delete/' + ${r.id}}" class="btn btn-danger btn-sm">Delete</a>
</td>
        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
