<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Bills</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container mt-5">

    <div class="topbar">
        <h4>My Bills</h4>

        <div>
            <a href="/patient/dashboard" class="btn btn-outline-primary">Dashboard</a>
            <a href="/logout" class="btn btn-danger">Logout</a>
        </div>
    </div>

    <table class="table table-bordered table-hover mt-4">
        <thead class="table-dark">
        <tr>
            <th>Invoice ID</th>
            <th>Patient</th>
            <th>Consultation Fee</th>
            <th>Medicine Fee</th>
            <th>Lab Fee</th>
            <th>Total</th>
            <th>Status</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="b : ${bills}">
            <td th:text="${b.invoiceId}"></td>
            <td th:text="${b.patientName}"></td>
            <td th:text="${b.consultationFee}"></td>
            <td th:text="${b.medicineFee}"></td>
            <td th:text="${b.labFee}"></td>
            <td th:text="${b.totalAmount}"></td>
            <td th:text="${b.paymentStatus}"></td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
