<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctor Availability</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container mt-5">

    <div class="topbar">
        <h4>My Availability</h4>

        <div>
            <a href="/doctor/dashboard" class="btn btn-outline-primary">Dashboard</a>
            <a href="/logout" class="btn btn-danger">Logout</a>
        </div>
    </div>

    <div class="card shadow p-4 mt-4">

        <h4>Add Availability Slot</h4>

        <form th:action="@{/doctor/saveAvailability}"
              method="post"
              th:object="${availability}">

            <div class="row">

                <div class="col-md-4 mb-3">
                    <label>Date</label>
                    <input type="date"
                           th:field="*{availableDate}"
                           class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label>Start Time</label>
                    <input type="time"
                           th:field="*{startTime}"
                           class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label>End Time</label>
                    <input type="time"
                           th:field="*{endTime}"
                           class="form-control">
                </div>

            </div>

            <button class="btn btn-success">
                Save Availability
            </button>

        </form>

    </div>

    <div class="card shadow p-4 mt-4">

        <h4>Availability Slots</h4>

        <table class="table table-bordered mt-3">

            <thead class="table-dark">
            <tr>
                <th>Doctor</th>
                <th>Date</th>
                <th>Start</th>
                <th>End</th>
                <th>Status</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="s : ${slots}">
                <td th:text="${s.doctorName}"></td>
                <td th:text="${s.availableDate}"></td>
                <td th:text="${s.startTime}"></td>
                <td th:text="${s.endTime}"></td>
                <td th:text="${s.status}"></td>
            </tr>
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
