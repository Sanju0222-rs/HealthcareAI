<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctor Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container mt-5">

    <h2>Welcome <span th:text="${session.userName}">User</span></h2>
    <p class="text-muted">Manage appointments, patients and medical reports</p>
<div class="row mt-4">
    <div class="col-md-4 mb-3">

    <div class="card shadow border-success">

        <div class="card-body text-center">

           <h4>
Doctor Income:
<span th:text="${doctorIncome}">0</span>
</h4>
        </div>

    </div>

</div>
    

    <div class="col-md-4 mb-3">
        <div class="dashboard-card">
            <h5>My Appointments</h5>
            <a href="/doctor/appointments" class="btn btn-primary mt-2">View</a>
        </div>
    </div>

    <div class="col-md-4 mb-3">
        <div class="dashboard-card">
            <h5>Patient Records</h5>
            <a href="/doctor/patients" class="btn btn-primary mt-2">View</a>
        </div>
    </div>

    <div class="col-md-4 mb-3">
        <div class="dashboard-card">
            <h5>Add Medical Report</h5>
            <a href="/doctor/addReport" class="btn btn-success mt-2">Add Report</a>
        </div>
    </div>

    <div class="col-md-4 mb-3">
        <div class="dashboard-card">
            <h5>Medical Reports</h5>
            <a href="/doctor/reports" class="btn btn-primary mt-2">View Reports</a>
        </div>
    </div>

    <div class="col-md-4 mb-3">
    <div class="dashboard-card">
        <h5>My Availability</h5>
        <a href="/doctor/availability"
           class="btn btn-info mt-2">
            Manage
        </a>
    </div>
</div>

    <div class="col-md-4 mb-3">
        <div class="dashboard-card">
            <h5>Prescriptions</h5>
            <a href="/doctor/addReport" class="btn btn-warning mt-2">Write</a>
        </div>
    </div>

    <div class="col-md-4 mb-3">
    <div class="dashboard-card">
        <h5>My Income</h5>
        <a href="/doctor/income"
           class="btn btn-success mt-2">
            View Income
        </a>
    </div>
</div>

</div>

    <a href="/logout" class="btn btn-danger mt-4">Logout</a>

</div>

</body>
</html>
