<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctor Income</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container mt-5">

    <div class="topbar">
        <h4>My Consultation Income</h4>

        <div>
            <a href="/doctor/dashboard" class="btn btn-outline-primary">Dashboard</a>
            <a href="/logout" class="btn btn-danger">Logout</a>
        </div>
    </div>

    <div class="card shadow p-4 mt-4 mb-4">
        <h5>Total Paid Consultation Income</h5>
        <h2>₹ <span th:text="${doctorIncome}">0</span></h2>
    </div>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">
        <tr>
            <th>Invoice ID</th>
            <th>Patient</th>
            <th>Doctor</th>
            <th>Consultation Fee</th>
            <th>Total Bill</th>
            <th>Status</th>
            <th>Date</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="b : ${bills}">
            <td th:text="${b.invoiceId}"></td>
            <td th:text="${b.patientName}"></td>
            <td th:text="${b.doctorName}"></td>
            <td th:text="${b.consultationFee}"></td>
            <td th:text="${b.totalAmount}"></td>
            <td th:text="${b.paymentStatus}"></td>
            <td th:text="${b.billDate}"></td>
        </tr>
        </tbody>

    </table>

</div>

</body>
</html>
