<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Patient</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="mb-4">Add Patient</h2>

        <form th:action="@{/patients/savePatient}"
              method="post"
              th:object="${patient}">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label>Patient ID</label>
                    <input type="text"
                           th:field="*{patientId}"
                           class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Name</label>
                    <input type="text"
                           th:field="*{name}"
                           class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label>Age</label>
                    <input type="number"
                           th:field="*{age}"
                           class="form-control">
                </div>

                <div class="col-md-4 mb-3">
                    <label>Gender</label>
                    <select th:field="*{gender}" class="form-control">

    <option value="">Select Gender</option>

    <option value="Male">Male</option>

    <option value="Female">Female</option>

    <option value="Other">Other</option>

</select>
                </div>

                <div class="col-md-4 mb-3">
                    <label>Blood Group</label>
                    <input type="text"
                           th:field="*{bloodGroup}"
                           class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Email</label>
                    <input type="email"
                           th:field="*{email}"
                           class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Phone</label>
                    <input type="text"
                           th:field="*{phone}"
                           class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Disease</label>
                    <input type="text"
                           th:field="*{disease}"
                           class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Address</label>
                    <input type="text"
                           th:field="*{address}"
                           class="form-control">
                </div>

            </div>

            <button class="btn btn-success">
                Save Patient
            </button>

            <a href="/patients/"
   class="btn btn-secondary">
   ← Back
</a>
            </a>

        </form>

    </div>

</div>

</body>
</html>
