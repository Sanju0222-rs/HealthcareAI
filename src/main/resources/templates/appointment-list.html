<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Appointment Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Appointment Management</h2>

    <a href="/appointments/addAppointment"
       class="btn btn-primary mb-3">
        Add Appointment
    </a>
    <a href="/admin"
   class="btn btn-secondary mb-3">
   ← Dashboard
</a>
<form action="/appointments/search" method="get" class="d-flex mb-3">
    <input type="text" name="keyword" class="form-control me-2" placeholder="Search appointment by patient name">
    <button class="btn btn-primary">Search</button>
    <a href="/appointments/" class="btn btn-secondary ms-2">Reset</a>
</form>
    <table class="table table-bordered table-hover">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Appointment ID</th>
            <th>Patient</th>
            <th>Doctor</th>
            <th>Date</th>
            <th>Time</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="appointment : ${appointments}">

            <td th:text="${appointment.id}"></td>

            <td th:text="${appointment.appointmentId}"></td>

            <td th:text="${appointment.patientName}"></td>

            <td th:text="${appointment.doctorName}"></td>

            <td th:text="${appointment.appointmentDate}"></td>

            <td th:text="${appointment.appointmentTime}"></td>

            <td>
                <span class="badge bg-success"
                      th:text="${appointment.status}">
                </span>
            </td>
            <td>
    <a th:href="@{'/appointments/edit/' + ${appointment.id}}"
       class="btn btn-warning btn-sm">
        Edit
    </a>

    <a th:href="@{'/appointments/delete/' + ${appointment.id}}"
       class="btn btn-danger btn-sm">
        Delete
    </a>
</td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
