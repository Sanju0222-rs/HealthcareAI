<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar">

        <h3 class="logo">
            <i class="fa-solid fa-hospital"></i>
            HealthcareAI
        </h3>

        <ul>
            <li><a href="#"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>
            <li><a href="/doctors/"><i class="fa-solid fa-user-doctor"></i> Doctors</a></li>
            <li><a href="/patients/"><i class="fa-solid fa-hospital-user"></i> Patients</a></li>
            <li><a href="/appointments/"><i class="fa-solid fa-calendar-check"></i> Appointments</a></li>
            <li><a href="/reports/"><i class="fa-solid fa-file-medical"></i> Reports</a></li>
            <li><a href="/billing/"><i class="fa-solid fa-money-bill-wave"></i> Billing</a></li>
            
            <li>
    <a href="/logout">
        <i class="fa-solid fa-right-from-bracket"></i>
        Logout
    </a>
</li>
        </ul>

    </div>

    <!-- Main Content -->

    <div class="content p-4">
        

      <h2>Welcome <span th:text="${session.userName}">
        User

      </span></h2>

      

        <div class="row mt-4">

            <div class="col-md-3">
                <div class="dashboard-card">
                    <h5>Total Doctors</h5>
                    <h2 th:text="${doctorCount}"></h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="dashboard-card">
                    <h5>Total Patients</h5>
                    <h2 th:text="${patientCount}"></h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="dashboard-card">
                    <h5>Appointments</h5>
                    <h2 th:text="${appointmentCount}"></h2>
                </div>
            </div>

            <div class="col-md-3">
                <div class="dashboard-card">
                    <h5>Revenue</h5>
                    <h2>₹ <span th:text="${revenue}"></span></h2>
                </div>
           </div>

        </div>

        <div class="card mt-5">
            <div class="card-body">

                <h4>Recent Appointments</h4>

                <table class="table">

                    <thead>
                    <tr>
                        <th>Patient</th>
                        <th>Doctor</th>
                        <th>Date</th>
                        <th>Status</th>
                    </tr>
                    </thead>

                    <tbody>

                     <tr th:each="a : ${recentAppointments}">
                     <td th:text="${a.patientName}"></td>

                        <td th:text="${a.doctorName}"></td>

                       <td th:text="${a.appointmentDate}"></td>

                     <td>
                         <span class="badge bg-success"
                             th:text="${a.status}">
                        </span>
                      </td>
                  </tr>

                </tbody>

                </table>

            </div>
        </div>

    </div>

</div>

</body>
</html>
