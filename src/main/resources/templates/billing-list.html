<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Billing Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Billing Management</h2>

    <div class="mb-3">
        <a href="/billing/addBill"
           class="btn btn-primary">
            Generate Invoice
        </a>

        <a href="/admin"
           class="btn btn-secondary">
            ← Dashboard
        </a>
    </div>

    <form action="/billing/search"
          method="get"
          class="d-flex mb-3">

        <input type="text"
               name="keyword"
               class="form-control me-2"
               placeholder="Search bill by patient name">

        <button class="btn btn-primary">
            Search
        </button>

        <a href="/billing/"
           class="btn btn-secondary ms-2">
            Reset
        </a>

    </form>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Invoice</th>
            <th>Bill Date</th>
            <th>Doctor</th>
            <th>Patient</th>
            <th>Subtotal</th>
            <th>GST</th>
            <th>Grand Total</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="b : ${bills}">
            <td th:text="${b.id}"></td>
            <td th:text="${b.invoiceId}"></td>
            <td th:text="${b.billDate}"></td>
            <td th:text="${b.doctorName}"></td>
            <td th:text="${b.patientName}"></td>
            <td th:text="${b.totalAmount}"></td>
            <td th:text="${b.gstAmount}"></td>
            <td th:text="${b.grandTotal}"></td>
            <td th:text="${b.paymentStatus}"></td>

            <td>
                <a th:href="@{'/billing/pay/' + ${b.id}}"
                   class="btn btn-success btn-sm">
                    Pay
                </a>

                <a th:href="@{'/billing/edit/' + ${b.id}}"
                   class="btn btn-warning btn-sm">
                    Edit
                </a>

                <a th:href="@{'/billing/delete/' + ${b.id}}"
                   class="btn btn-danger btn-sm">
                    Delete
                </a>
            </td>
        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
