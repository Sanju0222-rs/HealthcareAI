<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Patient Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container mt-5">

    <div class="topbar">
       <h2>Welcome <span th:text="${session.userName}">User</span></h2>

        <div>
            <a href="/logout" class="btn btn-danger">
                Logout
            </a>
        </div>
    </div>

    <h2 class="mt-4">Welcome Patient 👨‍⚕️</h2>
    <p class="text-muted">
        Manage your appointments, reports and bills.
    </p>

    <div class="row mt-4">

        <div class="col-md-4 mb-3">
            <div class="dashboard-card">
                <h5>Book Appointment</h5>

                <a href="/patient/bookAppointment"
                   class="btn btn-primary mt-2">
                    Open
                </a>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="dashboard-card">
                <h5>My Appointments</h5>

                <a href="/patient/appointments"
                   class="btn btn-primary mt-2">
                    View
                </a>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="dashboard-card">
                <h5>My Medical Reports</h5>

                <a href="/patient/reports"
                   class="btn btn-primary mt-2">
                    View
                </a>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="dashboard-card">
                <h5>My Bills</h5>

                <a href="/patient/bills"
                   class="btn btn-primary mt-2">
                    View
                </a>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="dashboard-card">
                <h5>AI Symptom Checker</h5>

                <a href="/ai/checker"
                   class="btn btn-success mt-2">
                    Open
                </a>
            </div>
        </div>

    </div>

</div>

</body>
</html>
