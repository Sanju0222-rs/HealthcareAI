<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Invoice</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow p-5">

        <h2 class="text-center">HealthcareAI Invoice</h2>

        <hr>

        <p><b>Invoice ID:</b> <span th:text="${bill.invoiceId}"></span></p>
        <p><b>Patient:</b> <span th:text="${bill.patientName}"></span></p>
        <p><b>Doctor:</b> <span th:text="${bill.doctorName}"></span></p>
        <p><b>Bill Date:</b> <span th:text="${bill.billDate}"></span></p>

        <hr>

        <p><b>Consultation Fee:</b> ₹ <span th:text="${bill.consultationFee}"></span></p>
        <p><b>Medicine Fee:</b> ₹ <span th:text="${bill.medicineFee}"></span></p>
        <p><b>Lab Fee:</b> ₹ <span th:text="${bill.labFee}"></span></p>

        <hr>

        <p><b>Subtotal:</b> ₹ <span th:text="${bill.totalAmount}"></span></p>
        <p><b>GST 18%:</b> ₹ <span th:text="${bill.gstAmount}"></span></p>

        <h4>
            <b>Grand Total:</b>
            ₹ <span th:text="${bill.grandTotal}"></span>
        </h4>

        <h5 class="mt-3">
            Payment Status:
            <span class="badge bg-success"
                  th:text="${bill.paymentStatus}">
            </span>
        </h5>

        <div class="mt-4">
            <button onclick="window.print()"
                    class="btn btn-primary">
                Print Invoice
            </button>

            <a href="/billing/"
               class="btn btn-secondary">
                Back to Billing
            </a>
        </div>

    </div>

</div>

</body>
</html>
