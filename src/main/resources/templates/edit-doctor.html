<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Doctor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="mb-4">Edit Doctor</h2>

        <form th:action="@{/doctors/updateDoctor}"
              method="post"
              th:object="${doctor}">

            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label>Doctor Name</label>
                <input type="text"
                       th:field="*{name}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Specialization</label>
                <input type="text"
                       th:field="*{specialization}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email"
                       th:field="*{email}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Phone</label>
                <input type="text"
                       th:field="*{phone}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Department</label>
                <input type="text"
                       th:field="*{department}"
                       class="form-control">
            </div>

            <button class="btn btn-success">
                Update Doctor
            </button>

            <a href="/doctors/" class="btn btn-secondary">
                Back
            </a>

        </form>

    </div>

</div>

</body>
</html>
