<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Patients</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-4">
        <h2>Patient Management</h2>
           <a href="/patients/addPatient"
           class="btn btn-primary">
            Add Patient
        </a>
         <a href="/admin"
            class="btn btn-secondary">
                ← Dashboard
            </a>

    </div>
    <form action="/patients/search" method="get" class="d-flex mb-3">
    <input type="text" name="keyword" class="form-control me-2" placeholder="Search patient by name">
    <button class="btn btn-primary">Search</button>
    <a href="/patients/" class="btn btn-secondary ms-2">Reset</a>
</form>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Patient ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Disease</th>
            <th>Phone</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="patient : ${patients}">
            <td th:text="${patient.id}"></td>
            <td th:text="${patient.patientId}"></td>
            <td th:text="${patient.name}"></td>
            <td th:text="${patient.age}"></td>
            <td th:text="${patient.gender}"></td>
            <td th:text="${patient.disease}"></td>
            <td th:text="${patient.phone}"></td>
            <td>
    <a th:href="@{'/patients/edit/' + ${patient.id}}"
       class="btn btn-warning btn-sm">
        Edit
    </a>

    <a th:href="@{'/patients/delete/' + ${patient.id}}"
       class="btn btn-danger btn-sm">
        Delete
    </a>
</td>
        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
